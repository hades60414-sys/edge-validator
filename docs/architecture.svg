<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 400" font-family="'Segoe UI', 'Microsoft JhengHei', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#38e1c4"/>
    </marker>
  </defs>

  <!-- canvas -->
  <rect x="0" y="0" width="920" height="400" rx="14" fill="#07090c"/>

  <!-- title -->
  <text x="30" y="38" fill="#e8f0ee" font-size="17" font-weight="700">Edge Validator — 架構 / Architecture</text>
  <text x="30" y="58" fill="#7d8a86" font-size="12">純靜態站 · 零後端 · 所有統計檢定在瀏覽器內執行 (static site · zero backend · all stats run in-browser)</text>

  <!-- client-side boundary -->
  <rect x="120" y="84" width="700" height="252" rx="12" fill="none" stroke="#38e1c4" stroke-width="1.6" stroke-dasharray="7 5"/>
  <text x="138" y="108" fill="#38e1c4" font-size="12.5" font-weight="700" letter-spacing="1">你的瀏覽器 YOUR BROWSER — 資料不越過這條虛線 (data never crosses this line)</text>

  <!-- CSV input (outside-left, feeding in) -->
  <g>
    <rect x="24" y="170" width="88" height="76" rx="8" fill="#0d1218" stroke="#3a4650" stroke-width="1.2"/>
    <text x="68" y="200" fill="#e8f0ee" font-size="13" font-weight="700" text-anchor="middle">CSV</text>
    <text x="68" y="218" fill="#7d8a86" font-size="10" text-anchor="middle">回測報酬</text>
    <text x="68" y="232" fill="#7d8a86" font-size="10" text-anchor="middle">backtest returns</text>
  </g>
  <line x1="112" y1="208" x2="152" y2="208" stroke="#38e1c4" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- parser -->
  <g>
    <rect x="156" y="164" width="150" height="88" rx="8" fill="#0d1218" stroke="#3a4650" stroke-width="1.2"/>
    <text x="231" y="192" fill="#e8f0ee" font-size="13" font-weight="700" text-anchor="middle">Parser (JS)</text>
    <text x="231" y="210" fill="#7d8a86" font-size="10" text-anchor="middle">UTF-8 / Big5 / cp950</text>
    <text x="231" y="224" fill="#7d8a86" font-size="10" text-anchor="middle">單欄 / 日期+報酬 / 矩陣</text>
    <text x="231" y="238" fill="#7d8a86" font-size="10" text-anchor="middle">淨值曲線自動轉報酬</text>
  </g>
  <line x1="306" y1="208" x2="346" y2="208" stroke="#38e1c4" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- Pyodide engine -->
  <g>
    <rect x="350" y="140" width="230" height="150" rx="8" fill="#0b1512" stroke="#38e1c4" stroke-width="1.4"/>
    <text x="465" y="166" fill="#38e1c4" font-size="13" font-weight="700" text-anchor="middle">Pyodide — Python in WASM</text>
    <rect x="366" y="180" width="198" height="52" rx="6" fill="#0d1218" stroke="#3a4650" stroke-width="1"/>
    <text x="465" y="200" fill="#e8f0ee" font-size="11.5" font-weight="700" text-anchor="middle">engine/judge_web.py</text>
    <text x="465" y="216" fill="#7d8a86" font-size="10" text-anchor="middle">DSR · PBO · SPA · StepM · null · cost</text>
    <rect x="366" y="240" width="198" height="36" rx="6" fill="#0d1218" stroke="#3a4650" stroke-width="1"/>
    <text x="465" y="255" fill="#e8f0ee" font-size="11" font-weight="700" text-anchor="middle">statshim.py</text>
    <text x="465" y="269" fill="#7d8a86" font-size="10" text-anchor="middle">純 numpy 取代 scipy (no scipy)</text>
  </g>
  <line x1="580" y1="208" x2="620" y2="208" stroke="#38e1c4" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- verdict -->
  <g>
    <rect x="624" y="152" width="172" height="112" rx="8" fill="#0d1218" stroke="#3a4650" stroke-width="1.2"/>
    <text x="710" y="180" fill="#e8f0ee" font-size="13" font-weight="700" text-anchor="middle">判決書 Verdict</text>
    <text x="710" y="200" fill="#5ee39a" font-size="10.5" text-anchor="middle">可能真實 likely-real</text>
    <text x="710" y="216" fill="#c9b458" font-size="10.5" text-anchor="middle">結論不明 inconclusive</text>
    <text x="710" y="232" fill="#e06c6c" font-size="10.5" text-anchor="middle">疑似過擬合 likely-overfit</text>
    <text x="710" y="252" fill="#7d8a86" font-size="10" text-anchor="middle">白話 + 完整統計證據</text>
  </g>

  <!-- benchmarks (static json, inside boundary, feeds engine) -->
  <g>
    <rect x="350" y="300" width="230" height="26" rx="6" fill="none" stroke="#3a4650" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="465" y="317" fill="#7d8a86" font-size="10" text-anchor="middle">benchmarks/baselines.json(隨站台靜態載入)</text>
  </g>
  <line x1="465" y1="300" x2="465" y2="292" stroke="#3a4650" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- no-server note -->
  <text x="838" y="208" fill="#e06c6c" font-size="11.5" font-weight="700">✕ 無伺服器</text>
  <text x="838" y="224" fill="#7d8a86" font-size="10">no upload</text>
  <text x="838" y="238" fill="#7d8a86" font-size="10">no tracking</text>

  <!-- footer -->
  <text x="30" y="376" fill="#7d8a86" font-size="11">GitHub Pages 只負責送出 HTML/JS/CSS 靜態檔;CSV 與計算結果從不離開本機。關掉分頁,一切歸零。</text>
</svg>
